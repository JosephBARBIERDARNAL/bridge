name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: |
          cargo fmt --all -- --check
          bunx prettier --check "apps/bridge/**/*.{ts,tsx,js,json,md}" "*.{json,md}"

      - name: Lint
        run: |
          cargo clippy --workspace --all-targets -- -D warnings
          bun run typecheck

      - name: Test
        run: |
          cargo test --workspace
          bun run test

      - name: Audit dependencies
        run: |
          bun audit
          cargo install cargo-audit --locked
          cargo audit

  android:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies and Android toolchain
        run: |
          bun install --frozen-lockfile
          sdkmanager "platforms;android-36" "build-tools;35.0.1" "ndk;27.3.13750724"
          cargo install cargo-ndk --locked

      - name: Assemble debug APK
        run: bun --cwd apps/bridge android:build
